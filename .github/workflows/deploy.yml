name: Deploy

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Windows Service
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File "$env:GITHUB_WORKSPACE\scripts\deploy_windows.ps1" -RepoPath "C:\apps\gestionaleTorneoLocale" -ServiceName "gestionale_torneo" -Branch "master"
