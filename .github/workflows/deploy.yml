name: Deploy

on:
  push:
    branches: [ "master" ]

jobs:
  deploy:
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker
        shell: powershell
        run: |
          docker context ls
          docker context use default
          docker version

      - name: Deploy
        shell: powershell
        run: |
          cd $env:GITHUB_WORKSPACE
          docker compose up -d --build
          docker compose ps
